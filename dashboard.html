<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Berhasil Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            
            /* efek gradasi ungu modern (linear-gradient) */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .welcome-box {
            text-align: center;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.95); /* Putih transparan tipis */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            transition: all 0.3s ease;
        }
        .welcome-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            color: white;
            font-size: 2.5rem;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
        }
        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            color: #666;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .logout-btn {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 25px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
        }
        .logout-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.6);
            transform: scale(1.03);
        }
    </style>
</head>
<body>

<div class="welcome-box">
    <div class="icon-box">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1>Login Berhasil!</h1>
    <p>Selamat datang kembali di <strong>Cita Models</strong>.<br>Halaman utama Anda siap digunakan.</p>
    
    <a href="index.html" class="logout-btn">Kembali</a>
</div>

</body>
</html>
