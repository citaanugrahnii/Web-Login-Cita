<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita MOdels Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="login-section">

        <div class="logo">
            <div class="cube">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h2>Cita Models</h2>
        </div>

        <div class="login-box">
            <h1>Welcome back</h1>
            <p>Please enter your details</p>

            <form action="dashboard.html" method="GET" id="loginForm">
                <label>Email address</label>
                <input type="email" placeholder="Masukkan email anda" required>

                <label>Password</label>
                <input type="password" placeholder="Masukkan password anda" required>

                <div class="options">
                    <div>
                        <input type="checkbox" id="remember">
                        <label style="display: inline; font-weight: normal;" for="remember">Remember for 30 days</label>
                    </div>
                    <a href="#">Forgot password</a>
                </div>

                <button type="submit" class="signin-btn">
                    Sign in
                </button>

                <button type="button" class="google-btn">
                    <i class="fab fa-google"></i>
                    Sign in with Google
                </button>

                <div class="signup">
                    Don't have an account?
                    <a href="#">Sign up</a>
                </div>

            </form>
        </div>

    </div>

    <div class="image-section">

        <div class="illustration">

            <div class="circle"></div>

            <div class="screen">
                <div class="person">
                    <div class="head"></div>
                    <div class="body"></div>
                </div>
            </div>

            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
